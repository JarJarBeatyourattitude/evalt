name: Publish Evalt to PyPI

on:
  release:
    types: [published]
  workflow_dispatch:
    inputs:
      tag:
        description: Existing Evalt release tag to publish, such as v0.11.0
        required: true
        type: string

permissions:
  contents: read

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Resolve release tag
        id: release
        shell: bash
        env:
          REQUESTED_TAG: ${{ inputs.tag || github.event.release.tag_name }}
        run: |
          if [[ ! "$REQUESTED_TAG" =~ ^v[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
            echo "Expected an existing vMAJOR.MINOR.PATCH release tag." >&2
            exit 1
          fi
          echo "tag=$REQUESTED_TAG" >> "$GITHUB_OUTPUT"
      - uses: actions/checkout@v7
        with:
          ref: ${{ steps.release.outputs.tag }}
          persist-credentials: false
      - uses: actions/setup-python@v7
        with:
          python-version: "3.12"
          cache: pip
      - name: Build and verify distributions
        run: |
          python -m pip install --upgrade pip build twine
          python -m build
          python -m twine check dist/*
      - uses: actions/upload-artifact@v6
        with:
          name: python-package-distributions
          path: dist/
          if-no-files-found: error
          retention-days: 7

  publish:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: pypi
      url: https://pypi.org/project/evalt/
    permissions:
      id-token: write
    steps:
      - uses: actions/download-artifact@v7
        with:
          name: python-package-distributions
          path: dist/
      - name: Publish with PyPI Trusted Publishing
        uses: pypa/gh-action-pypi-publish@release/v1
