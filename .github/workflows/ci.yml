name: CI

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.10", "3.11", "3.12", "3.13"]
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-python@v7
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip
      - run: python -m pip install --upgrade pip build
      - run: python -m pip install -e .
      - run: python -m unittest discover -s tests -v
      - run: python -m build
      - run: python -m pip install --force-reinstall dist/evalt-*.whl
      - run: evalt --version
      - run: evalt validate examples/synthetic-routing-job.json
